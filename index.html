<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Whiskr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf6ee;
      --ink: #1a1208;
      --muted: #9a8f82;
      --like-green: #3dca7a;
      --dislike-red: #f05a5a;
      --like-bg: rgba(61,202,122,0.13);
      --dislike-bg: rgba(240,90,90,0.13);
      --shadow: 0 8px 40px rgba(26,18,8,0.12);
      --shadow-lg: 0 20px 60px rgba(26,18,8,0.18);
      --radius: 24px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    #root { width: 100%; height: 100dvh; display: flex; flex-direction: column; }

    /* ── Splash ── */
    .splash {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 100;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-paw { font-size: 3.2rem; animation: paw-bounce 0.9s ease infinite alternate; }
    @keyframes paw-bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-10px) scale(1.08); }
    }
    .splash-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem; font-weight: 700; letter-spacing: -1px;
    }
    .splash-sub {
      font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .splash-bar-wrap {
      width: 130px; height: 3px;
      background: rgba(26,18,8,0.1);
      border-radius: 99px; overflow: hidden; margin-top: 4px;
    }
    .splash-bar-fill {
      height: 100%; background: var(--ink);
      border-radius: 99px; transition: width 0.25s ease;
    }

    /* ── Header ── */
    .header { padding: 20px 24px 8px; text-align: center; flex-shrink: 0; }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700; letter-spacing: -0.5px;
    }
    .header h1 span { font-style: italic; font-weight: 400; }
    .progress-bar-wrap {
      margin: 10px auto 0; height: 3px;
      background: rgba(26,18,8,0.1); border-radius: 99px;
      overflow: hidden; width: min(340px, 90vw);
    }
    .progress-bar-fill {
      height: 100%; background: var(--ink); border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .counter {
      margin-top: 6px; font-size: 0.75rem; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    }

    /* ── Card Stack ── */
    .stack-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; padding: 8px 16px; min-height: 0;
    }
    .card-stack {
      position: relative;
      width: min(360px, 92vw);
      height: min(480px, 65dvh);
    }
    .card {
      position: absolute; inset: 0;
      border-radius: var(--radius); overflow: hidden;
      background: #fff; box-shadow: var(--shadow);
      cursor: grab; touch-action: none;
      user-select: none; -webkit-user-select: none;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card.is-top  { box-shadow: var(--shadow-lg); z-index: 10; }
    .card.is-second { z-index: 9; transform: scale(0.95) translateY(12px); pointer-events: none; }
    .card.is-third  { z-index: 8; transform: scale(0.90) translateY(24px); pointer-events: none; }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

    @keyframes card-enter {
      from { transform: scale(0.93) translateY(16px); opacity: 0.7; }
      to   { transform: scale(1) translateY(0);       opacity: 1; }
    }
    .card.animate-enter { animation: card-enter 0.3s cubic-bezier(0.34,1.3,0.64,1) both; }

    /* Skeleton */
    .card-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(110deg, #ece8e1 30%, #f5f1eb 50%, #ece8e1 70%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Error */
    .card-error {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--muted); font-size: 0.85rem;
    }
    .card-error span:first-child { font-size: 2.2rem; }

    /* Swipe overlays */
    .swipe-overlay {
      position: absolute; inset: 0; pointer-events: none;
      z-index: 5; border-radius: var(--radius); opacity: 0;
    }
    .swipe-overlay-like    { background: linear-gradient(135deg, rgba(61,202,122,0.6) 0%, rgba(61,202,122,0) 65%); }
    .swipe-overlay-dislike { background: linear-gradient(225deg, rgba(240,90,90,0.6) 0%, rgba(240,90,90,0) 65%); }

    /* Hint labels */
    .hint-like, .hint-dislike {
      position: absolute; top: 28px; padding: 6px 16px;
      border-radius: 8px; font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 700; opacity: 0;
      pointer-events: none; z-index: 20; border: 3px solid;
    }
    .hint-like    { left: 20px;  color: var(--like-green);   border-color: var(--like-green);   background: var(--like-bg);    transform: rotate(-8deg); }
    .hint-dislike { right: 20px; color: var(--dislike-red);  border-color: var(--dislike-red);  background: var(--dislike-bg); transform: rotate(8deg); }

    /* ── Action bar ── */
    .action-bar {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; gap: 20px; padding: 10px 24px 26px;
    }
    .btn-action {
      border-radius: 50%; border: none; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      background: #fff; -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    .btn-action:active { transform: scale(0.88) !important; }
    .btn-action:disabled { opacity: 0.3; cursor: default; }
    .btn-undo    { width: 52px; height: 52px; font-size: 1.3rem; box-shadow: 0 4px 16px rgba(26,18,8,0.12); }
    .btn-dislike { width: 64px; height: 64px; font-size: 1.75rem; box-shadow: 0 4px 20px rgba(240,90,90,0.22); }
    .btn-like    { width: 72px; height: 72px; font-size: 1.9rem;  box-shadow: 0 4px 20px rgba(61,202,122,0.25); }
    .btn-undo:hover:not(:disabled)    { box-shadow: 0 4px 22px rgba(26,18,8,0.22); }
    .btn-dislike:hover:not(:disabled) { box-shadow: 0 4px 28px rgba(240,90,90,0.38); }
    .btn-like:hover:not(:disabled)    { box-shadow: 0 4px 28px rgba(61,202,122,0.4); }

    .swipe-tip {
      flex-shrink: 0; font-size: 0.72rem; color: var(--muted);
      text-align: center; padding-bottom: 2px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* ── Summary ── */
    .summary {
      width: 100%; height: 100dvh; display: flex;
      flex-direction: column; overflow: hidden;
      animation: fade-up 0.4s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .summary-header { padding: 28px 24px 16px; text-align: center; flex-shrink: 0; }
    .summary-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 2.4rem); font-weight: 700; line-height: 1.1;
    }
    .summary-header h2 em { font-style: italic; font-weight: 400; }
    .summary-stats { display: flex; gap: 12px; justify-content: center; margin-top: 14px; }
    .stat-pill { padding: 6px 18px; border-radius: 99px; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.03em; }
    .stat-liked { background: var(--ink); color: #fff; }
    .stat-total { background: rgba(26,18,8,0.08); color: var(--muted); }
    .summary-scroll { flex: 1; overflow-y: auto; padding: 8px 20px 20px; -webkit-overflow-scrolling: touch; }
    .summary-scroll::-webkit-scrollbar { display: none; }
    .liked-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .liked-thumb {
      aspect-ratio: 1; border-radius: 16px; overflow: hidden;
      background: rgba(26,18,8,0.06);
      animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .liked-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .no-likes { text-align: center; padding: 48px 0; }
    .no-likes p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; color: var(--muted); }
    .btn-restart {
      display: block; width: calc(100% - 48px); margin: 0 24px 28px;
      padding: 16px; background: var(--ink); color: #fff; border: none;
      border-radius: 16px; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 500; cursor: pointer;
      letter-spacing: 0.03em; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    .btn-restart:active { opacity: 0.8; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const TOTAL = 15;

function makeUrls() {
  const seed = Date.now();
  return Array.from({ length: TOTAL }, (_, i) => `https://cataas.com/cat?v=${seed}_${i}`);
}

// Preloads all images up front and tracks per-url status
function useImagePreloader(urls) {
  const [states, setStates] = useState(() =>
    Object.fromEntries(urls.map(u => [u, 'loading']))
  );
  const cache = useRef({});

  useEffect(() => {
    // When urls change (restart), reset state
    setStates(Object.fromEntries(urls.map(u => [u, 'loading'])));
    cache.current = {};

    urls.forEach(url => {
      const img = new Image();
      cache.current[url] = img;
      img.onload  = () => setStates(s => ({ ...s, [url]: 'loaded' }));
      img.onerror = () => setStates(s => ({ ...s, [url]: 'error'  }));
      img.src = url;
    });
  }, [urls]);

  return states;
}

// ── Splash ────────────────────────────────────────────────────────────
function Splash({ loadedCount, total, hidden }) {
  return (
    <div className={`splash${hidden ? ' hidden' : ''}`}>
      <div className="splash-paw">🐾</div>
      <div className="splash-title">Whiskr</div>
      <div className="splash-sub">Loading cats…</div>
      <div className="splash-bar-wrap">
        <div className="splash-bar-fill" style={{ width: `${Math.round(loadedCount / total * 100)}%` }} />
      </div>
    </div>
  );
}

// ── SwipeCard ─────────────────────────────────────────────────────────
function SwipeCard({ url, imageState, stackIndex, onSwipe, registerFlyOut, animate }) {
  const cardRef  = useRef(null);
  const startRef = useRef(null);
  const deltaRef = useRef({ x: 0, y: 0 });
  const isTop    = stackIndex === 0;

  const getPos = (e) => {
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX, y: src.clientY };
  };

  const setOverlays = useCallback((likeOp, dislikeOp) => {
    const el = cardRef.current;
    if (!el) return;
    el.querySelector('[data-overlay="like"]').style.opacity    = likeOp;
    el.querySelector('[data-overlay="dislike"]').style.opacity = dislikeOp;
    el.querySelector('[data-hint="like"]').style.opacity       = likeOp;
    el.querySelector('[data-hint="dislike"]').style.opacity    = dislikeOp;
  }, []);

  const applyDrag = useCallback((dx, dy) => {
    if (!cardRef.current) return;
    cardRef.current.style.transform =
      `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.08}deg)`;
    const r = Math.min(Math.abs(dx) / 80, 1);
    if (dx > 20)       setOverlays(r, 0);
    else if (dx < -20) setOverlays(0, r);
    else               setOverlays(0, 0);
  }, [setOverlays]);

  const resetCard = useCallback(() => {
    if (!cardRef.current) return;
    cardRef.current.style.transition = 'transform 0.4s cubic-bezier(0.34,1.2,0.64,1)';
    cardRef.current.style.transform  = 'translate(0,0) rotate(0deg)';
    setOverlays(0, 0);
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ''; }, 400);
  }, [setOverlays]);

  const flyOut = useCallback((dir) => {
    if (!cardRef.current) return;
    const x = dir === 'right' ? window.innerWidth * 1.5 : -window.innerWidth * 1.5;
    cardRef.current.style.transition = 'transform 0.42s cubic-bezier(0.4,0,1,1)';
    cardRef.current.style.transform  =
      `translate(${x}px, 0) rotate(${dir === 'right' ? 30 : -30}deg)`;
    setTimeout(() => onSwipe(dir === 'right'), 400);
  }, [onSwipe]);

  useEffect(() => {
    if (!isTop) return;
    if (registerFlyOut) registerFlyOut(flyOut);
    return () => { if (registerFlyOut) registerFlyOut(null); };
  }, [isTop, flyOut, registerFlyOut]);

  const onPointerDown = useCallback((e) => {
    if (!isTop) return;
    startRef.current = getPos(e);
    deltaRef.current = { x: 0, y: 0 };
    if (cardRef.current) cardRef.current.style.transition = '';
  }, [isTop]);

  const onPointerMove = useCallback((e) => {
    if (!startRef.current || !isTop) return;
    const pos = getPos(e);
    deltaRef.current = { x: pos.x - startRef.current.x, y: pos.y - startRef.current.y };
    applyDrag(deltaRef.current.x, deltaRef.current.y);
  }, [isTop, applyDrag]);

  const onPointerUp = useCallback(() => {
    if (!startRef.current) return;
    const { x: dx } = deltaRef.current;
    startRef.current = null;
    Math.abs(dx) > 90 ? flyOut(dx > 0 ? 'right' : 'left') : resetCard();
  }, [flyOut, resetCard]);

  const cls = [
    'card',
    animate ? 'animate-enter' : '',
    isTop ? 'is-top' : stackIndex === 1 ? 'is-second' : 'is-third'
  ].filter(Boolean).join(' ');

  return (
    <div ref={cardRef} className={cls}
      onMouseDown={onPointerDown} onMouseMove={onPointerMove}
      onMouseUp={onPointerUp}    onMouseLeave={onPointerUp}
      onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
    >
      {imageState === 'error' ? (
        <div className="card-error">
          <span>🙀</span>
          <span>Cat escaped!</span>
        </div>
      ) : (
        <>
          {imageState !== 'loaded' && <div className="card-skeleton" />}
          <img
            src={url} alt="A cat" draggable={false}
            style={{ opacity: imageState === 'loaded' ? 1 : 0 }}
          />
        </>
      )}
      {isTop && (
        <>
          <div data-overlay="like"    className="swipe-overlay swipe-overlay-like" />
          <div data-overlay="dislike" className="swipe-overlay swipe-overlay-dislike" />
          <div data-hint="like"    className="hint-like">LIKE ❤️</div>
          <div data-hint="dislike" className="hint-dislike">😿 NOPE</div>
        </>
      )}
    </div>
  );
}

// ── Summary ───────────────────────────────────────────────────────────
function Summary({ liked, total, onRestart }) {
  return (
    <div className="summary">
      <div className="summary-header">
        <h2>Your <em>purr-fect</em><br/>picks 🐾</h2>
        <div className="summary-stats">
          <span className="stat-pill stat-liked">❤️ {liked.length} liked</span>
          <span className="stat-pill stat-total">{total} cats seen</span>
        </div>
      </div>
      <div className="summary-scroll">
        {liked.length === 0 ? (
          <div className="no-likes">
            <p>No favourites this time…</p>
            <p style={{marginTop:8,fontSize:'0.85rem',fontFamily:'DM Sans,sans-serif',fontStyle:'normal'}}>
              Try again — the cats miss you.
            </p>
          </div>
        ) : (
          <div className="liked-grid">
            {liked.map((url, i) => (
              <div className="liked-thumb" key={i} style={{ animationDelay: `${i * 0.06}s` }}>
                <img src={url} alt={`Liked cat ${i + 1}`} />
              </div>
            ))}
          </div>
        )}
      </div>
      <button className="btn-restart" onClick={onRestart}>Meet more cats →</button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [urls, setUrls]       = useState(makeUrls);
  const [index, setIndex]     = useState(0);
  const [liked, setLiked]     = useState([]);
  const [history, setHistory] = useState([]);
  const [done, setDone]       = useState(false);
  const [splashHidden, setSplashHidden] = useState(false);
  const flyOutRef  = useRef(null);
  const imageStates = useImagePreloader(urls);

  const loadedCount = useMemo(
    () => Object.values(imageStates).filter(s => s !== 'loading').length,
    [imageStates]
  );

  // Hide splash as soon as first image is ready
  useEffect(() => {
    if (!splashHidden && imageStates[urls[0]] !== 'loading') {
      setTimeout(() => setSplashHidden(true), 250);
    }
  }, [imageStates, urls, splashHidden]);

  const handleSwipe = useCallback((isLike) => {
    const currentUrl = urls[index];
    setHistory(h => [...h, { index, url: currentUrl, wasLiked: isLike }]);
    if (isLike) setLiked(prev => [...prev, currentUrl]);
    const next = index + 1;
    if (next >= TOTAL) setTimeout(() => setDone(true), 100);
    else setIndex(next);
  }, [index, urls]);

  const handleUndo = useCallback(() => {
    if (history.length === 0) return;
    const last = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    if (last.wasLiked) setLiked(l => l.filter(u => u !== last.url));
    setIndex(last.index);
    setDone(false);
  }, [history]);

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight') flyOutRef.current?.('right');
      if (e.key === 'ArrowLeft')  flyOutRef.current?.('left');
      if (e.key === 'z' || e.key === 'Backspace') handleUndo();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [handleUndo]);

  const handleRestart = () => {
    const fresh = makeUrls();
    setUrls(fresh);
    setIndex(0);
    setLiked([]);
    setHistory([]);
    setDone(false);
    setSplashHidden(false);
  };

  if (done) return <Summary liked={liked} total={TOTAL} onRestart={handleRestart} />;

  const visibleCards = [0, 1, 2]
    .map(offset => index + offset)
    .filter(i => i < TOTAL)
    .reverse();

  return (
    <>
      <Splash loadedCount={loadedCount} total={TOTAL} hidden={splashHidden} />

      <div className="header">
        <h1>Whiskr <span>🐾</span></h1>
        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{ width: `${(index / TOTAL) * 100}%` }} />
        </div>
        <p className="counter">{index + 1} / {TOTAL}</p>
      </div>

      <div className="stack-area">
        <div className="card-stack">
          {visibleCards.map((cardIndex) => (
            <SwipeCard
              key={urls[cardIndex]}
              url={urls[cardIndex]}
              imageState={imageStates[urls[cardIndex]] || 'loading'}
              stackIndex={cardIndex - index}
              onSwipe={handleSwipe}
              animate={cardIndex === index && index > 0}
              registerFlyOut={cardIndex === index
                ? (fn) => { flyOutRef.current = fn; }
                : null
              }
            />
          ))}
        </div>
      </div>

      <p className="swipe-tip">← swipe to decide →</p>

      <div className="action-bar">
        <button
          className="btn-action btn-undo"
          onClick={handleUndo}
          disabled={history.length === 0}
          aria-label="Undo"
          title="Undo (Z)"
        >↩</button>

        <button
          className="btn-action btn-dislike"
          onClick={() => flyOutRef.current?.('left')}
          aria-label="Dislike"
        >😿</button>

        <button
          className="btn-action btn-like"
          onClick={() => flyOutRef.current?.('right')}
          aria-label="Like"
        >❤️</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
